name: release-fork

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repo owner/name
        run: |
          echo "GITHUB_REPO_OWNER=${GITHUB_REPOSITORY_OWNER}" >> $GITHUB_ENV
          echo "GITHUB_REPO_OWNER_LOWER=$(echo ${GITHUB_REPOSITORY_OWNER} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "GITHUB_REPO_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV
          echo "DOCKERHUB_USERNAME=skip" >> $GITHUB_ENV
          echo "TAG_MESSAGE=Fork release for ${GITHUB_REPOSITORY} ${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_OWNER: ${{ env.GITHUB_REPO_OWNER }}
          GITHUB_REPO_OWNER_LOWER: ${{ env.GITHUB_REPO_OWNER_LOWER }}
          GITHUB_REPO_NAME: ${{ env.GITHUB_REPO_NAME }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          TAG_MESSAGE: ${{ env.TAG_MESSAGE }}
